{% extends 'layout.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mt-5">
            <div class="card-header">
                <h3 class="text-center">Welcome to Budget Tracker</h3>
            </div>
            <div class="card-body">
                <p class="text-center text-muted">Please enter your name to access your personal tracker.</p>
                <form method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label">Name / User ID</label>
                        <input type="text" class="form-control" id="username" name="username" required placeholder="e.g. Alice">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Start Tracking</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
